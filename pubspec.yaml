name: hse_aksamala
description: HSE Aksamala mobile app
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  flutter_riverpod: ^2.6.1
  go_router: ^16.1.0
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  camera: ^0.11.2

  equatable: ^2.0.7
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  getwidget: ^7.0.0
  url_launcher: ^6.3.2
  google_mlkit_text_recognition: ^0.15.1
  image_picker: ^1.2.1
  hugeicons: ^0.0.8
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.1.0
  flutter_svg: ^2.0.16
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  build_runner: ^2.4.9
  json_serializable: ^6.9.4
  freezed: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - lib/assets/add_bold.svg
    - lib/assets/add_icon_solid.svg
    - lib/assets/calendar.svg
    - lib/assets/tasks.svg
    - lib/assets/home.svg
    - lib/assets/logos/hse-aksamala.png
